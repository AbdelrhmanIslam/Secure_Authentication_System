{% extends "base.html" %}

{% block content %}
<h2>Two-Factor Authentication</h2>
<p style="margin-bottom: 1rem; opacity: 0.8;">Enter the 6-digit code from your authenticator app.</p>
<form method="POST" action="{{ url_for('auth.verify_2fa_route') }}">
    <input type="hidden" name="user_id" value="{{ user_id }}">
    <input name="code" type="text" placeholder="6-digit code" autocomplete="off" required>
    <button type="submit" class="btn">Verify</button>
</form>
{% endblock %}
